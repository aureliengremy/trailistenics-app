<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plan Trail · 20 km / 740 D+</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,900&family=Archivo:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Applique le thème stocké AVANT le premier rendu (évite tout flash).
      try {
        if (localStorage.getItem("planTrail.theme.v1") === "light") {
          document.documentElement.classList.add("theme-light")
        }
      } catch (e) {
        /* localStorage indisponible — thème sombre par défaut */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
