# Blueprint Render — API FastAPI (backend/). DB = Neon (Postgres serverless, externe).
# Déploiement : Render > New > Blueprint > sélectionne ce repo. Renseigne ensuite
# DATABASE_URL et CORS_ORIGINS (marqués sync:false → saisis manuellement, jamais committés).
services:
  - type: web
    name: trailistenics-api
    runtime: python
    plan: free
    region: virginia # US-East, proche du projet Neon us-east-1 (latence DB minimale)
    rootDir: backend
    # Les migrations tournent au build (Alembic est idempotent : ne ré-applique rien).
    buildCommand: pip install -e . && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Chaîne Neon — préfixe IMPÉRATIF `postgresql+psycopg://` (driver psycopg 3).
      # Ex : postgresql+psycopg://USER:PWD@ep-xxx.eu-central-1.aws.neon.tech/plantrail?sslmode=require
      - key: DATABASE_URL
        sync: false
      # URL(s) du front Vercel, séparées par des virgules (ex : https://trailistenics-app.vercel.app)
      - key: CORS_ORIGINS
        sync: false
      # (Optionnel) Clé API Resend → active les emails de notification d'inscription.
      # Absente = pas d'envoi (l'admin voit les nouveaux comptes dans l'onglet Admin).
      - key: RESEND_API_KEY
        sync: false
      # (Optionnel) Webhook entrant Slack → notification à chaque intake rempli, avec le
      # JSON complet (entrée du pipeline de génération). Absente = pas d'envoi.
      - key: SLACK_WEBHOOK_URL
        sync: false
