<!DOCTYPE html>
<html lang="fr" data-density="regular">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Trail · 20 km / 740 D+</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,600;1,9..144,900&family=Archivo:wght@400;500;600;700;800&family=Spectral:ital,wght@0,400;0,600;0,800;1,600&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16140f; --bg2:#1f1c14; --panel:#26221a; --panel2:#2e2920;
    --line:#3a342a; --ink:#f2ede0; --muted:#a99e88;
    --moss:#7ba05b; --moss-d:#5c7d3f;
    --ocre:#d98a3d; --ocre-d:#b4691f;
    --rust:#c2562e; --sky:#6fa8c4;
    --accent:#d98a3d; --accent-d:#b4691f;
    --title-font:'Fraunces',serif;
    --tex:0.45;
    /* density */
    --sec-pad:48px; --gap:16px;
  }
  html[data-density="compact"]{--sec-pad:34px; --gap:12px;}
  html[data-density="comfy"]{--sec-pad:66px; --gap:22px;}

  /* THEME CLAIR */
  html.theme-light{
    --bg:#efe7d6; --bg2:#e8dfca; --panel:#fbf6ea; --panel2:#f3ebd9;
    --line:#d9cdb2; --ink:#2a2519; --muted:#7d7256;
    --moss:#5c7d3f; --moss-d:#46612e;
    --ocre:#bd7322; --ocre-d:#9a5a15;
    --rust:#b04a24; --sky:#3f86a6;
    --accent:#bd7322; --accent-d:#9a5a15;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Archivo',sans-serif; line-height:1.55; overflow-x:hidden;
    background-image:
      radial-gradient(circle at 15% 8%, color-mix(in oklab, var(--moss) 12%, transparent), transparent 42%),
      radial-gradient(circle at 88% 96%, color-mix(in oklab, var(--accent) 10%, transparent), transparent 46%);
    transition:background-color .4s, color .4s;
  }
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    opacity:calc(var(--tex)*0.9);
    background-image:repeating-linear-gradient(0deg,transparent,transparent 38px,
      color-mix(in oklab, var(--ink) 4%, transparent) 38px,
      color-mix(in oklab, var(--ink) 4%, transparent) 39px);
  }
  .wrap{max-width:1100px;margin:0 auto;padding:0 22px;position:relative;z-index:1}
  h1,h2,h3{font-family:var(--title-font);line-height:1.05;letter-spacing:-.01em}

  /* HERO */
  header{padding:72px 0 38px;position:relative;overflow:hidden}
  .contour{position:absolute;top:-30px;right:-60px;width:760px;max-width:78%;height:auto;
    z-index:0;pointer-events:none;opacity:calc(.35 + var(--tex)*0.5)}
  .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:30px;
    position:relative;z-index:1}
  .hero-text{max-width:640px}
  .kicker{font-family:'Archivo';font-weight:800;letter-spacing:.22em;text-transform:uppercase;
    font-size:12px;color:var(--accent);margin-bottom:18px}
  h1{font-size:clamp(44px,8vw,92px);font-weight:900;color:var(--ink)}
  h1 .em{font-style:italic;color:var(--moss)}
  .sub{margin-top:18px;font-size:18px;color:var(--muted);max-width:600px;text-wrap:pretty}

  .hero-prog{display:flex;align-items:center;gap:16px;background:color-mix(in oklab,var(--panel) 86%,transparent);
    border:1px solid var(--line);border-radius:16px;padding:16px 20px;backdrop-filter:blur(3px);flex:0 0 auto}
  .pring{position:relative;width:88px;height:88px;flex:0 0 auto}
  .pring-c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
  .pring-n{font-family:var(--title-font);font-weight:900;font-size:30px;color:var(--ink)}
  .pring-d{font-size:11px;color:var(--muted);margin-top:1px}
  .hero-prog-txt .hp-k{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--moss);font-weight:700}
  .hero-prog-txt .hp-cur{font-size:15px;color:var(--muted);margin-top:4px}
  .hero-prog-txt .hp-cur b{color:var(--ink);font-weight:700}

  .stats{display:flex;flex-wrap:wrap;gap:14px;margin-top:34px;position:relative;z-index:1}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 22px;min-width:120px}
  .stat .n{font-family:var(--title-font);font-weight:900;font-size:30px;color:var(--accent);line-height:1}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:6px}

  section{padding:var(--sec-pad) 0;position:relative}
  .sec-head{display:flex;align-items:baseline;gap:16px;margin-bottom:8px}
  .sec-num{font-family:var(--title-font);font-weight:900;font-size:20px;color:var(--moss-d)}
  h2{font-size:clamp(28px,4vw,42px);font-weight:900}
  .sec-intro{color:var(--muted);max-width:680px;margin:14px 0 28px;font-size:16px;text-wrap:pretty}

  /* CARD + CHART */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px 26px 18px}
  .chart-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .tab{background:var(--bg2);border:1px solid var(--line);color:var(--muted);
    padding:9px 16px;border-radius:30px;cursor:pointer;font-family:'Archivo';font-weight:600;
    font-size:13px;transition:.2s}
  .tab:hover{color:var(--ink);border-color:var(--moss-d)}
  .tab.active{background:var(--moss);color:var(--bg);border-color:var(--moss)}
  .chart-wrap{position:relative}
  .chart-svg{width:100%;aspect-ratio:1040/430;height:auto;display:block}
  .chart-svg rect[fill="transparent"]{cursor:crosshair}
  .chart-tip{position:absolute;transform:translate(-50%,calc(-100% - 14px));
    background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px 13px;
    pointer-events:none;white-space:nowrap;box-shadow:0 10px 28px rgba(0,0,0,.4);z-index:3}
  .chart-tip .tip-w{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .chart-tip .tip-v{font-family:var(--title-font);font-weight:900;font-size:22px;color:var(--ink);margin:2px 0}
  .chart-tip .tip-v span{font-size:12px;font-family:'Archivo';font-weight:500;color:var(--muted)}
  .chart-tip .tip-b{font-size:12px;font-weight:700}
  .chart-legend{display:flex;gap:20px;flex-wrap:wrap;margin-top:14px;font-size:13px;color:var(--muted)}
  .chart-legend span{display:inline-flex;align-items:center;gap:7px}
  .dot{width:12px;height:12px;border-radius:3px;display:inline-block}

  /* TIMELINE */
  .tl-track{display:flex;gap:7px;overflow-x:auto;padding:10px 2px 18px;scroll-snap-type:x mandatory}
  .tl-track::-webkit-scrollbar{height:8px}
  .tl-track::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .week{flex:0 0 auto;width:88px;scroll-snap-align:center;cursor:pointer;font-family:'Archivo';
    background:var(--panel);border:1px solid var(--line);border-radius:13px;color:var(--ink);
    padding:12px 8px;text-align:center;transition:.18s;position:relative}
  .week:hover{transform:translateY(-4px);border-color:var(--moss)}
  .week.active{border-color:var(--accent);background:var(--panel2);box-shadow:0 8px 26px rgba(0,0,0,.4)}
  .week.cur::after{content:"AUJOURD'HUI";position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
    font-size:7.5px;font-weight:800;letter-spacing:.1em;background:var(--accent);color:var(--bg);
    padding:2px 6px;border-radius:8px;white-space:nowrap}
  .week .wn{font-family:var(--title-font);font-weight:900;font-size:22px}
  .week .wb{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:3px;min-height:22px}
  .week .bar{height:5px;border-radius:4px;margin-top:8px;background:var(--moss)}
  .week[data-bloc="pic"] .bar,.week[data-bloc="simul"] .bar{background:var(--rust)}
  .week[data-bloc="affut"] .bar{background:var(--sky)}
  .week[data-bloc="allege"] .bar{background:var(--muted);opacity:.6}
  .week .race{position:absolute;top:-9px;right:-6px;font-size:15px}
  .week .wcheck{position:absolute;top:6px;left:8px;width:16px;height:16px;border-radius:50%;
    background:var(--moss);color:var(--bg);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .week.done{border-color:var(--moss-d)}

  .detail{margin-top:24px;background:var(--panel2);border:1px solid var(--line);
    border-left:5px solid var(--accent);border-radius:14px;padding:24px 26px;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
  .detail h3{font-size:26px;margin-top:2px}
  .detail .dtag{display:inline-block;font-size:11px;font-weight:800;text-transform:uppercase;
    letter-spacing:.12em;padding:4px 12px;border-radius:20px;margin-bottom:10px}
  .detail-nav{display:flex;gap:7px;flex:0 0 auto}
  .navbtn{width:36px;height:36px;border-radius:10px;background:var(--bg2);border:1px solid var(--line);
    color:var(--ink);font-size:20px;cursor:pointer;transition:.18s;line-height:1}
  .navbtn:hover:not(:disabled){border-color:var(--moss);color:var(--moss)}
  .navbtn:disabled{opacity:.35;cursor:default}
  .dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:var(--gap);margin-top:16px}
  .dbox{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:14px 16px}
  .dbox .k{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--moss);font-weight:700}
  .dbox .v{font-size:15px;margin-top:5px}
  .dnote{margin-top:18px;color:var(--muted);font-size:15px;font-style:italic}
  .donebtn{margin-top:18px;background:transparent;border:1px solid var(--line);color:var(--muted);
    font-family:'Archivo';font-weight:600;font-size:14px;padding:11px 20px;border-radius:30px;cursor:pointer;transition:.2s}
  .donebtn:hover{border-color:var(--moss);color:var(--ink)}
  .donebtn.on{background:var(--moss);border-color:var(--moss);color:var(--bg)}

  /* CIRCUIT */
  .circuit-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;
    font-family:'Archivo';font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  .cb-count{color:var(--moss)}
  .circuit{display:grid;gap:12px}
  .ex{width:100%;text-align:left;font-family:'Archivo';color:var(--ink);
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;
    display:grid;grid-template-columns:44px 1fr auto;gap:16px;align-items:center;transition:.2s;cursor:pointer}
  .ex:hover{border-color:var(--moss-d);background:var(--panel2)}
  .ex .idx{font-family:var(--title-font);font-weight:900;font-size:26px;color:var(--moss-d);
    width:44px;height:44px;display:flex;align-items:center;justify-content:center;
    border:1px solid var(--line);border-radius:11px;transition:.2s}
  .ex.on{border-color:var(--moss-d)}
  .ex.on .idx{background:var(--moss);color:var(--bg);border-color:var(--moss)}
  .ex.on .name{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--moss-d)}
  .ex .name{font-weight:700;font-size:16px}
  .ex .why{font-size:13.5px;color:var(--muted);margin-top:3px;max-width:560px}
  .ex .vol{font-family:var(--title-font);font-weight:600;font-size:15px;color:var(--accent);white-space:nowrap;text-align:right}
  .chip{display:inline-block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;
    padding:3px 9px;border-radius:20px;background:color-mix(in oklab,var(--moss) 18%,transparent);color:var(--moss);margin-left:8px}

  /* ACCORDION */
  .acc{border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden;background:var(--panel)}
  .acc summary{cursor:pointer;padding:20px 24px;font-family:var(--title-font);font-weight:600;font-size:20px;
    list-style:none;display:flex;justify-content:space-between;align-items:center;gap:14px;transition:.2s}
  .acc summary::-webkit-details-marker{display:none}
  .acc summary:hover{background:var(--panel2)}
  .acc summary .plus{font-family:'Archivo';font-weight:400;color:var(--accent);font-size:26px;transition:.3s;flex:0 0 auto}
  .acc[open] summary .plus{transform:rotate(45deg)}
  .acc .body{padding:0 24px 22px;color:var(--ink)}
  .acc .body li{margin:0 0 10px 18px;color:var(--ink)}
  .acc .body li b{color:var(--moss)}
  .acc .body p{color:var(--muted);margin-bottom:10px}
  .warn{border-left:4px solid var(--accent);background:var(--bg2);padding:14px 18px;border-radius:8px;
    margin-top:14px;font-size:14px;color:var(--muted)}
  .warn b{color:var(--accent)}

  footer{padding:50px 0 90px;color:var(--muted);font-size:14px;font-style:italic;
    border-top:1px solid var(--line);margin-top:30px}

  @media(max-width:760px){
    header{padding:54px 0 30px}
    .hero-top{flex-direction:column;gap:22px}
    .hero-prog{align-self:flex-start}
    .contour{opacity:calc(.18 + var(--tex)*0.32)}
  }
  @media(max-width:560px){
    .ex{grid-template-columns:40px 1fr;gap:12px}
    .ex .vol{grid-column:2;text-align:left;margin-top:6px}
    .detail{padding:20px 18px}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components-chart.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
